# =============================================================================
# Helper function: derive a unique sample basename from a round-based BAM path.
#
# Input:  "listeria_1/barcode03_AS.bam"  (relative path from filelist.txt)
# Output: "r1_barcode03_AS"
#
# This prevents collisions when the same barcode appears in multiple rounds.
# =============================================================================
derive_basename() {
    local bam_path="$1"
    local dir_name
    dir_name=$(basename "$(dirname "$bam_path")")
    local file_name
    file_name=$(basename "$bam_path" .bam)
    # Extract round number: listeria_1 → 1, listeria_2 → 2, etc.
    local round_num="${dir_name##listeria_}"
    echo "r${round_num}_${file_name}"
}
